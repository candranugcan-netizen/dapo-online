<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Akses Dapodik</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.5;
            font-size: 15px;
        }
        .btn {
            display: inline-block;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #1557b0;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a73e8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .footer-note {
            font-size: 12px;
            color: #888;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Portal Dapodik</h1>
        <p>Anda sedang diarahkan ke server utama Dapodik. Mohon tunggu sebentar...</p>
        
        <div class="loader"></div>
        <p>Mengarahkan otomatis dalam <strong id="timer">5</strong> detik...</p>
        
        <a href="#" id="dapodikLink" class="btn">Masuk Dapodik Sekarang</a>
        
        <div class="footer-note">Simpan (Bookmark) halaman ini. Alamat portal ini tidak akan berubah.</div>
    </div>

    <script>
        // ========================================================
        // BAGIAN INI YANG HARUS ANDA UPDATE SECARA BERKALA
        // Ganti link di dalam tanda kutip dengan link trycloudflare Anda yang baru
        // ========================================================
        const linkTunnelBaru = "https://knife-thought-nuts-popularity.trycloudflare.com"; 
        
        // Memasukkan link ke tombol
        document.getElementById('dapodikLink').href = linkTunnelBaru;

        // Logika Hitung Mundur (Countdown)
        let waktuTunggu = 5;
        const elemenTimer = document.getElementById('timer');

        const hitungMundur = setInterval(() => {
            waktuTunggu--;
            elemenTimer.textContent = waktuTunggu;
            
            if (waktuTunggu <= 0) {
                clearInterval(hitungMundur);
                // Eksekusi redirect otomatis
                window.location.href = linkTunnelBaru;
            }
        }, 1000);
    </script>

</body>
</html>
